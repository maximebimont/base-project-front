<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title></title>
</head>
<body>
  <div class="buttons">
    <ui-button>Principal</ui-button>
    <ui-button variant="secondary">Secondaire</ui-button>
  </div>
  <br>
  <div>
    <h2>Produits vedette</h2>
    <div class="cards">
      <ui-card
        name="La Joconde"
        [price]="8000"
        badge="Rare"
      />
      <ui-card
        name="Les bijoux de la Couronne"
        [price]="3000"
        badge="Edition Limitée"
      />
      <ui-card
        name="T-Max"
        [price]="2600"
        badge="Volé par Chaker"
      />
    </div>
  </div>
  <br><br>
  <div>
    <h2>Nouveaux Produits</h2>
    <ui-loader *ngIf="loading"></ui-loader>
  </div>
</body>
</html>
